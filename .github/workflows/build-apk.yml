name: Build DashCam APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master

permissions:
  contents: write

env:
  APK_NAME: DashCam-No-Audio.apk

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Flutter stable
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Create Android files safely
        run: flutter create --no-pub --platforms=android --org com.explapp --project-name dashcam_no_audio .

      - name: Create app icon
        shell: bash
        run: |
          # لا تضع ic_launcher.xml داخل mipmap لأن Flutter ينشئ ic_launcher.png هناك
          # ووجود xml + png بنفس اسم المورد يسبب Duplicate resources.
          mkdir -p android/app/src/main/res/drawable
          find android/app/src/main/res -path '*/mipmap-*/*' -name 'ic_launcher.xml' -delete || true
          cat > android/app/src/main/res/drawable/app_icon.xml <<'ICON'
          <vector xmlns:android="http://schemas.android.com/apk/res/android"
              android:width="108dp" android:height="108dp"
              android:viewportWidth="108" android:viewportHeight="108">
              <path android:fillColor="#0A0E12" android:pathData="M0,0h108v108h-108z"/>
              <path android:fillColor="#E53935" android:pathData="M30,38 L78,38 A8,8 0 0 1 86,46 L86,72 A8,8 0 0 1 78,80 L30,80 A8,8 0 0 1 22,72 L22,46 A8,8 0 0 1 30,38 Z"/>
              <path android:fillColor="#0A0E12" android:pathData="M48,49 L66,59 L48,69 Z"/>
          </vector>
          ICON

      - name: Patch Android settings
        shell: bash
        run: |
          cat > android/app/src/main/AndroidManifest.xml <<'MANIFEST'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android"
              xmlns:tools="http://schemas.android.com/tools">
              <uses-permission android:name="android.permission.CAMERA" />
              <uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />
              <uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />
              <uses-permission android:name="android.permission.RECORD_AUDIO" tools:node="remove" />
              <!-- الإشعارات -->
              <uses-permission android:name="android.permission.POST_NOTIFICATIONS" />
              <uses-permission android:name="android.permission.WAKE_LOCK" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE" />
              <uses-permission android:name="android.permission.FOREGROUND_SERVICE_CAMERA" />
              <!-- التخزين على الإصدارات القديمة -->
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="28" />
              <queries>
                  <intent>
                      <action android:name="android.media.action.IMAGE_CAPTURE" />
                  </intent>
              </queries>
              <application
                  android:label="داش كام بدون صوت"
                  android:name="${applicationName}"
                  android:icon="@drawable/app_icon"
                  android:usesCleartextTraffic="true">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data
                          android:name="io.flutter.embedding.android.NormalTheme"
                          android:resource="@style/NormalTheme" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <receiver android:exported="true" android:name="com.dexterous.flutterlocalnotifications.ScheduledNotificationReceiver" />
                  <receiver android:exported="true" android:name="com.dexterous.flutterlocalnotifications.ScheduledNotificationBootReceiver">
                      <intent-filter>
                          <action android:name="android.intent.action.BOOT_COMPLETED" />
                          <action android:name="android.intent.action.MY_PACKAGE_REPLACED" />
                          <action android:name="android.intent.action.QUICKBOOT_POWERON" />
                      </intent-filter>
                  </receiver>
                  <meta-data android:name="flutterEmbedding" android:value="2" />
              </application>
          </manifest>
          MANIFEST

          python3 - <<'PY'
          from pathlib import Path
          import re

          p = Path('android/app/build.gradle.kts')
          text = p.read_text()

          # minSdk مناسب للكاميرا والإشعارات
          text = text.replace('minSdk = flutter.minSdkVersion', 'minSdk = 24')
          text = re.sub(r'minSdk\s*=\s*\d+', 'minSdk = 24', text)

          # تفعيل desugaring داخل compileOptions مهما كان إصدار Java الموجود
          if 'isCoreLibraryDesugaringEnabled = true' not in text:
              m = re.search(r'compileOptions\s*\{', text)
              if m:
                  insert_at = m.end()
                  text = text[:insert_at] + '\n        isCoreLibraryDesugaringEnabled = true' + text[insert_at:]
              else:
                  m = re.search(r'android\s*\{', text)
                  if m:
                      insert_at = m.end()
                      block = '''

    compileOptions {
        isCoreLibraryDesugaringEnabled = true
        sourceCompatibility = JavaVersion.VERSION_17
        targetCompatibility = JavaVersion.VERSION_17
    }
'''
                      text = text[:insert_at] + block + text[insert_at:]

          # إضافة مكتبة desugar المطلوبة من flutter_local_notifications
          dep_line = '    coreLibraryDesugaring("com.android.tools:desugar_jdk_libs:2.1.4")'
          if 'coreLibraryDesugaring(' not in text:
              m = re.search(r'dependencies\s*\{', text)
              if m:
                  insert_at = m.end()
                  text = text[:insert_at] + '\n' + dep_line + text[insert_at:]
              else:
                  text += '\n\ndependencies {\n' + dep_line + '\n}\n'

          p.write_text(text)
          PY

      - name: Remove default Flutter test
        run: rm -rf test

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze app source
        run: flutter analyze lib/main.dart || true

      - name: Build release APK
        # المحاولة الأولى لبناء ffmpeg_kit_flutter_new قد تفشل لأن AAR يُنزَّل
        # تلقائياً في أول تشغيل لـ Gradle ولا يكون جاهزاً بعد — نعيد المحاولة.
        run: |
          flutter build apk --release --no-tree-shake-icons || \
          (echo "First build attempt failed (likely AAR download) — retrying..." && \
           flutter build apk --release --no-tree-shake-icons)

      - name: Rename APK
        run: cp build/app/outputs/flutter-apk/app-release.apk "$APK_NAME"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: DashCam-No-Audio-APK
          path: ${{ env.APK_NAME }}

      - name: Publish latest APK release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-apk
          name: داش كام بدون صوت - آخر نسخة APK
          files: ${{ env.APK_NAME }}
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
